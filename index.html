<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa do Fies | ProFies</title>
<meta name="description" content="Consulte as notas de corte do Fies para Medicina em todo o Brasil, por edição, estado, município e modalidade de concorrência.">
<style>
  :root{
    --azul:#4256C8;
    --azul-escuro:#2F3E9E;
    --vermelho:#EE6A43;
    --amarelo:#FED766;
    --verde:#63C132;
    --grafite:#070914;
    --bg:#F7F8FC;
    --card:#FFFFFF;
    --border:#E3E6F0;
    --texto:#1B1D29;
    --texto-sec:#6A6D80;
    --texto-muted:#9EA1B3;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg);
    color:var(--texto);
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}
  .header{
    background:var(--azul);
    color:#fff;
    padding:16px 16px 14px;
  }
  .header-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:2px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .brand-mark{
    width:28px;height:28px;border-radius:8px;
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:13px;color:var(--azul);
    flex-shrink:0;
  }
  .brand-name{font-size:13px;font-weight:600;letter-spacing:0.02em;opacity:0.92;}
  .header h1{
    font-size:21px;
    font-weight:600;
    margin:6px 0 2px;
  }
  .header p{
    font-size:12.5px;
    margin:0;
    opacity:0.85;
  }
  .container{
    max-width:640px;
    margin:0 auto;
    padding:0 14px 40px;
  }
  .search-wrap{
    position:relative;
    margin:14px 0 10px;
  }
  .search-wrap input{
    width:100%;
    padding:10px 12px 10px 36px;
    border-radius:var(--radius);
    border:1px solid var(--border);
    font-size:14px;
    background:var(--card);
  }
  .search-wrap input:focus{outline:2px solid var(--azul);outline-offset:-1px;}
  .search-icon{
    position:absolute;left:12px;top:50%;transform:translateY(-50%);
    color:var(--texto-muted);font-size:14px;
  }
  .filters-row{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding-bottom:2px;
    margin-bottom:10px;
    -webkit-overflow-scrolling:touch;
  }
  .filters-row select{
    flex-shrink:0;
    font-size:12.5px;
    padding:7px 10px;
    border-radius:var(--radius);
    border:1px solid var(--border);
    background:var(--card);
    color:var(--texto);
    min-width:120px;
  }
  .toggle-group{
    display:flex;
    gap:6px;
    margin-bottom:8px;
  }
  .toggle-group button{
    flex:1;
    font-size:12.5px;
    padding:8px 4px;
    border-radius:var(--radius);
    border:1px solid var(--border);
    background:var(--card);
    color:var(--texto-sec);
    cursor:pointer;
    font-weight:500;
  }
  .toggle-group button.active{
    background:var(--azul);
    border-color:var(--azul);
    color:#fff;
  }
  .kpis{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    margin:14px 0;
  }
  .kpi{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:9px 6px;
    text-align:center;
  }
  .kpi .num{font-size:16px;font-weight:700;margin:0;}
  .kpi .label{font-size:10px;color:var(--texto-sec);margin:2px 0 0;line-height:1.2;}
  .result-count{
    font-size:12.5px;
    color:var(--texto-sec);
    margin:0 0 10px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px 14px;
    margin-bottom:10px;
    cursor:pointer;
  }
  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
  }
  .badge{
    display:inline-block;
    font-size:10.5px;
    font-weight:600;
    padding:2px 8px;
    border-radius:6px;
    margin-bottom:6px;
  }
  .card-name{font-size:14px;font-weight:600;margin:0;line-height:1.3;}
  .card-sub{font-size:12px;color:var(--texto-sec);margin:2px 0 0;}
  .score-box{text-align:right;flex-shrink:0;}
  .score-label{font-size:9.5px;color:var(--texto-muted);margin:0;text-transform:uppercase;letter-spacing:0.03em;}
  .score-value{font-size:19px;font-weight:700;margin:0;font-variant-numeric:tabular-nums;}
  .card-foot{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid var(--border);
    font-size:12px;
    color:var(--texto-sec);
  }
  .chev{font-size:14px;color:var(--texto-muted);transition:transform 0.15s;}
  .card.open .chev{transform:rotate(180deg);}
  .card-detail{
    display:none;
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid var(--border);
  }
  .card.open .card-detail{display:block;}
  .detail-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }
  .detail-group-title{
    font-size:11px;
    font-weight:600;
    color:var(--texto-sec);
    margin:0 0 6px;
    text-transform:uppercase;
    letter-spacing:0.02em;
  }
  .detail-row{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    padding:5px 8px;
    border-radius:6px;
    margin-bottom:4px;
  }
  .detail-row.na{color:var(--texto-muted);}
  .detail-row .nome{color:var(--texto-sec);}
  .detail-row .valor{font-weight:600;font-variant-numeric:tabular-nums;}
  .empty{
    text-align:center;
    padding:40px 20px;
    color:var(--texto-sec);
  }
  .empty i{font-size:28px;color:var(--texto-muted);}
  footer{
    text-align:center;
    font-size:11.5px;
    color:var(--texto-muted);
    padding:20px 14px 30px;
  }
  footer a{color:var(--azul);text-decoration:none;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="brand">
      <div class="brand-mark">P</div>
      <div class="brand-name">ProFies</div>
    </div>
  </div>
  <h1>Mapa do Fies</h1>
  <p>Notas de corte de Medicina, por edição e modalidade</p>
</div>

<div class="container">

  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="busca" placeholder="Cidade ou instituição">
  </div>

  <div class="filters-row">
    <select id="fEdicao"></select>
    <select id="fEstado"><option value="">Estado: todos</option></select>
    <select id="fMunicipio"><option value="">Município: todos</option></select>
  </div>

  <div class="toggle-group" id="grupoTipo">
    <button data-tipo="Fies" class="active">Fies</button>
    <button data-tipo="Social">Fies Social</button>
  </div>
  <div class="toggle-group" id="grupoCota">
    <button data-cota="ampla" class="active">Ampla</button>
    <button data-cota="ppiq">PPIQ</button>
    <button data-cota="pcd">PCD</button>
  </div>

  <div class="kpis">
    <div class="kpi"><p class="num" id="kInst">-</p><p class="label">Instituições</p></div>
    <div class="kpi"><p class="num" id="kVagas">-</p><p class="label">Vagas</p></div>
    <div class="kpi"><p class="num" id="kMin">-</p><p class="label">Menor nota</p></div>
    <div class="kpi"><p class="num" id="kMax">-</p><p class="label">Maior nota</p></div>
  </div>

  <p class="result-count" id="contagem"></p>

  <div id="lista"></div>

</div>

<footer id="rodape">Carregando...</footer>

<script>
let DADOS = [];
let ESTADO = { edicao: null, uf: "", municipio: "", tipo: "Fies", cota: "ampla", busca: "" };

const modKey = () => ESTADO.cota + ESTADO.tipo.charAt(0).toUpperCase() + ESTADO.tipo.slice(1);

const badgeCor = (conceito) => {
  if (conceito >= 4) return { bg: "#E9F7E1", fg: "#2E7D32" };
  if (conceito === 3) return { bg: "#FEF3D9", fg: "#8A6110" };
  if (conceito > 0) return { bg: "#FBEAE3", fg: "#A8431F" };
  return { bg: "#EEEFF5", fg: "#6A6D80" };
};

function fmtNota(n){
  if (n === null || n === undefined) return null;
  return n.toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtMoeda(n){
  if (n === null || n === undefined) return "-";
  return n.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
}
function fmtInt(n){
  return Math.round(n || 0).toLocaleString("pt-BR");
}

function ordenarEdicoes(lista){
  const tipoOrdem = { "Regular": 0, "Remanescentes": 1 };
  return lista.sort((a,b) => {
    const [anoA, restoA] = a.split(".");
    const [semA, tipoAstr] = restoA.split(" - ");
    const [anoB, restoB] = b.split(".");
    const [semB, tipoBstr] = restoB.split(" - ");
    if (anoA !== anoB) return anoB.localeCompare(anoA);
    if (semA !== semB) return semB.localeCompare(semA);
    return (tipoOrdem[tipoAstr] ?? 9) - (tipoOrdem[tipoBstr] ?? 9);
  });
}

function popularFiltros(){
  const edicoes = ordenarEdicoes([...new Set(DADOS.map(d => d.ed))]);
  const selEd = document.getElementById("fEdicao");
  selEd.innerHTML = edicoes.map(e => `<option value="${e}">${e}</option>`).join("");
  ESTADO.edicao = edicoes[0];

  const estados = [...new Set(DADOS.map(d => d.uf))].sort((a,b)=>a.localeCompare(b,"pt"));
  const selUf = document.getElementById("fEstado");
  estados.forEach(uf => {
    const opt = document.createElement("option");
    opt.value = uf; opt.textContent = uf;
    selUf.appendChild(opt);
  });
}

function popularMunicipios(){
  const selMun = document.getElementById("fMunicipio");
  const base = ESTADO.uf ? DADOS.filter(d => d.uf === ESTADO.uf) : DADOS;
  const municipios = [...new Set(base.map(d => d.mun))].sort((a,b)=>a.localeCompare(b,"pt"));
  selMun.innerHTML = `<option value="">Município: todos</option>` + municipios.map(m => `<option value="${m}">${m}</option>`).join("");
  ESTADO.municipio = "";
}

function filtrarDados(){
  const chave = modKey();
  const buscaLower = ESTADO.busca.trim().toLowerCase();
  return DADOS.filter(d => {
    if (d.ed !== ESTADO.edicao) return false;
    if (ESTADO.uf && d.uf !== ESTADO.uf) return false;
    if (ESTADO.municipio && d.mun !== ESTADO.municipio) return false;
    const m = d.mod[chave];
    if (!m || m.n === null || m.n === undefined) return false;
    if (buscaLower && !(d.ies.toLowerCase().includes(buscaLower) || d.mun.toLowerCase().includes(buscaLower))) return false;
    return true;
  }).sort((a,b) => a.mod[chave].n - b.mod[chave].n);
}

function renderKPIs(lista){
  const chave = modKey();
  document.getElementById("kInst").textContent = fmtInt(lista.length);
  const totalVagas = lista.reduce((s,d) => s + (d.mod[chave].v || 0), 0);
  document.getElementById("kVagas").textContent = fmtInt(totalVagas);
  if (lista.length){
    document.getElementById("kMin").textContent = fmtNota(lista[0].mod[chave].n);
    document.getElementById("kMax").textContent = fmtNota(lista[lista.length-1].mod[chave].n);
  } else {
    document.getElementById("kMin").textContent = "-";
    document.getElementById("kMax").textContent = "-";
  }
}

function corNota(valor, min, max){
  if (max === min) return "#4256C8";
  const t = (valor - min) / (max - min);
  if (t < 0.33) return "#2E7D32";
  if (t < 0.66) return "#B8860B";
  return "#B23A1F";
}

const NOMES_MOD = {
  amplaFies: "Ampla", ppiqFies: "PPIQ", pcdFies: "PCD",
  amplaSocial: "Ampla", ppiqSocial: "PPIQ", pcdSocial: "PCD"
};

function detalheModalidades(item){
  const grupos = [
    { titulo: "Fies", chaves: ["amplaFies","ppiqFies","pcdFies"], bg: "#EEF1FC" },
    { titulo: "Fies Social", chaves: ["amplaSocial","ppiqSocial","pcdSocial"], bg: "#EAF6E4" }
  ];
  return `<div class="detail-grid">` + grupos.map(g => `
    <div>
      <p class="detail-group-title">${g.titulo}</p>
      ${g.chaves.map(k => {
        const m = item.mod[k];
        const nota = fmtNota(m.n);
        return `<div class="detail-row ${nota ? '' : 'na'}" style="background:${g.bg}">
          <span class="nome">${NOMES_MOD[k]}${m.v ? ' · ' + fmtInt(m.v) + ' vg' : ''}</span>
          <span class="valor">${nota || 'n/o'}</span>
        </div>`;
      }).join("")}
    </div>
  `).join("") + `</div>`;
}

function renderLista(lista){
  const el = document.getElementById("lista");
  document.getElementById("contagem").textContent = lista.length
    ? `${lista.length} instituição${lista.length>1?'ões':''} ofertando esta modalidade`
    : "";

  if (!lista.length){
    el.innerHTML = `<div class="empty"><i>&#9888;</i><p>Nenhuma instituição encontrada para esses filtros.<br>Tente outra modalidade ou outro estado.</p></div>`;
    return;
  }

  const chave = modKey();
  const notas = lista.map(d => d.mod[chave].n);
  const min = Math.min(...notas), max = Math.max(...notas);

  el.innerHTML = lista.map((item, idx) => {
    const m = item.mod[chave];
    const cor = corNota(m.n, min, max);
    const badge = badgeCor(item.conceito);
    return `
    <div class="card" data-idx="${idx}">
      <div class="card-top">
        <div style="min-width:0;">
          ${item.conceito ? `<span class="badge" style="background:${badge.bg};color:${badge.fg}">Conceito ${item.conceito}</span>` : ''}
          <p class="card-name">${item.ies}</p>
          <p class="card-sub">${item.mun}, ${siglaUf(item.uf)} · ${item.local || ''}</p>
        </div>
        <div class="score-box">
          <p class="score-label">nota de corte</p>
          <p class="score-value" style="color:${cor}">${fmtNota(m.n)}</p>
        </div>
      </div>
      <div class="card-foot">
        <span>${fmtInt(m.v)} vaga${m.v>1?'s':''}</span>
        <span>${fmtMoeda(item.mens)}</span>
        <span class="chev">&#9660;</span>
      </div>
      <div class="card-detail">${detalheModalidades(item)}</div>
    </div>`;
  }).join("");

  el.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", () => card.classList.toggle("open"));
  });
}

const SIGLAS = {"Acre":"AC","Alagoas":"AL","Amapá":"AP","Amazonas":"AM","Bahia":"BA","Ceará":"CE","Distrito Federal":"DF","Espírito Santo":"ES","Goiás":"GO","Maranhão":"MA","Mato Grosso":"MT","Mato Grosso do Sul":"MS","Minas Gerais":"MG","Pará":"PA","Paraíba":"PB","Paraná":"PR","Pernambuco":"PE","Piauí":"PI","Rio de Janeiro":"RJ","Rio Grande do Norte":"RN","Rio Grande do Sul":"RS","Rondônia":"RO","Roraima":"RR","Santa Catarina":"SC","São Paulo":"SP","Sergipe":"SE","Tocantins":"TO"};
function siglaUf(nome){ return SIGLAS[nome] || nome; }

function atualizarTudo(){
  const lista = filtrarDados();
  renderKPIs(lista);
  renderLista(lista);
}

function initEventos(){
  document.getElementById("fEdicao").addEventListener("change", e => { ESTADO.edicao = e.target.value; atualizarTudo(); });
  document.getElementById("fEstado").addEventListener("change", e => { ESTADO.uf = e.target.value; popularMunicipios(); atualizarTudo(); });
  document.getElementById("fMunicipio").addEventListener("change", e => { ESTADO.municipio = e.target.value; atualizarTudo(); });
  document.getElementById("busca").addEventListener("input", e => { ESTADO.busca = e.target.value; atualizarTudo(); });

  document.querySelectorAll("#grupoTipo button").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("#grupoTipo button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      ESTADO.tipo = btn.dataset.tipo;
      atualizarTudo();
    });
  });
  document.querySelectorAll("#grupoCota button").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("#grupoCota button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      ESTADO.cota = btn.dataset.cota;
      atualizarTudo();
    });
  });
}

function renderRodape(){
  const datas = DADOS.map(d => d.atualizacao).filter(Boolean);
  const el = document.getElementById("rodape");
  el.innerHTML = `Fies · Medicina · fonte: base interna ProFies` + (datas.length ? ` · atualizado em ${datas[0]}` : "") + `<br>Confirme sempre no edital oficial do Fies antes de decidir. <a href="https://www.instagram.com/financiamentoestudantil" target="_blank" rel="noopener">@financiamentoestudantil</a>`;
}

fetch("data.json")
  .then(r => r.json())
  .then(dados => {
    DADOS = dados;
    popularFiltros();
    popularMunicipios();
    initEventos();
    document.getElementById("fEdicao").value = ESTADO.edicao;
    atualizarTudo();
    renderRodape();
  })
  .catch(() => {
    document.getElementById("lista").innerHTML = `<div class="empty"><p>Não foi possível carregar os dados agora. Tente novamente em instantes.</p></div>`;
    document.getElementById("rodape").textContent = "Erro ao carregar dados.";
  });
</script>

</body>
</html>
